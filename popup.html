<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krompol Locker Status</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-card">
    <div class="header">
      <div class="icon-glow">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="header-icon" id="status-icon">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
      </div>
      <h3>Krompol Locker v.0.1</h3>
    </div>

    <!-- Status badge -->
    <div class="status-badge" id="status-badge">
      <span class="dot"></span>
      <span id="status-text">Memeriksa...</span>
    </div>

    <!-- View 1: Locked Actions (enter password in popup) -->
    <div id="locked-actions" class="content-section">
      <form id="popup-lock-form" onsubmit="return false;">
        <input type="password" id="popup-password-input" placeholder="Masukkan kata sandi..." required autocomplete="off">
        <div id="popup-error" class="error-text">Sandi salah!</div>
        <button type="submit" class="btn-popup btn-primary">Buka Kunci</button>
      </form>
    </div>

    <!-- View 2: Unlocked Actions (lock button + change password accordion) -->
    <div id="unlocked-actions" class="content-section">
      <p class="info-text">Aktivitas browser Anda normal dan dapat diakses sepenuhnya.</p>
      <button id="popup-lock-btn" class="btn-popup btn-danger">Kunci Sekarang</button>
      
      <!-- Accordion Button for Change Password -->
      <button id="accordion-toggle" class="btn-accordion">
        Ubah Kata Sandi
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron-icon" id="chevron-icon">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>

      <!-- Accordion Panel (hidden by default) -->
      <div id="accordion-panel" class="accordion-panel">
        <form id="change-pw-form" onsubmit="return false;">
          <input type="password" id="old-password" placeholder="Kata sandi lama..." required autocomplete="off">
          <input type="password" id="new-password" placeholder="Kata sandi baru..." required autocomplete="off">
          <input type="password" id="confirm-password" placeholder="Konfirmasi kata sandi baru..." required autocomplete="off">
          <div id="change-pw-feedback" class="feedback-text"></div>
          <button type="submit" class="btn-popup btn-secondary">Simpan Kata Sandi</button>
        </form>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
